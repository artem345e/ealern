{% extends 'base.html' %}
{% block title %}Вхід — EduLearn{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow border-0">
      <div class="card-body p-4">
        <h3 class="fw-bold text-center mb-4"><i class="bi bi-box-arrow-in-right text-primary me-2"></i>Вхід</h3>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Логін</label>
            <input type="text" name="username" class="form-control form-control-lg" placeholder="Введіть логін" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Пароль</label>
            <input type="password" name="password" class="form-control form-control-lg" placeholder="Введіть пароль" required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg fw-semibold">Увійти</button>
          </div>
        </form>
        <hr>
        <p class="text-center mb-0">Немає акаунту? <a href="{{ url_for('register') }}">Зареєструватись</a></p>
        <div class="mt-3 p-3 bg-light rounded small text-muted">
          <strong>Тестові дані:</strong><br>
          Викладач: <code>admin / admin123</code><br>
          Студент: <code>student1 / student123</code>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
